version: '3'
services:
    mongo:
        image: mongo:6.0
        ports:
            - 27017:27017
        volumes:
            - ./proxy-data:/data/db

    proxy:
        image: fiware/biz-ecosystem-logic-proxy:custom
        links:
            - mongo
        depends_on:
            - mongo
        ports:
            - 8000:8000